short_bio: >-
  <p>
    I am a Ph.D. student in Geography at the <a href="https://www.buffalo.edu/" target="_blank">University at Buffalo, SUNY</a>,
    advised by <a href="https://www.acsu.buffalo.edu/~yhu42/" target="_blank">Prof. Dr. Yingjie Hu</a>.
    My research lies at the intersection of <strong>GeoAI</strong>, <strong>Human Mobility</strong>, and <strong>Disaster Resilience</strong>.
  </p>
  <p>
    I am broadly interested in leveraging machine learning and geospatial data to understand human-environment interactions,
    with a focus on wildfire smoke exposure modeling, informal settlement mapping, and disaster impact assessment.
  </p>

